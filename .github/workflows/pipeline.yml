name: Deployment pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches: [main]
    types: [opened, synchronize]
jobs:
  deployment_pipeline:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install backend dependencies
        run: npm install
      - name: Run back tests
        run: npm run test
      - name: Install front end dependencies
        working-directory: puhelinluettelo
        run:  npm install
      - name: Check style for front end
        working-directory: puhelinluettelo
        run:  npm run lint
      - name: Run front tests
        working-directory: puhelinluettelo
        run: npm run test